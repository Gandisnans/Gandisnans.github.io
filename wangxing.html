<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亡星虚拟歌姬计划</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 30px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        .home-link {
            color: #ffb7c5;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
        }
        .menu-icon {
            font-size: 1.8em;
            color: #ffb7c5;
            text-decoration: none;
            line-height: 1;
            transition: 0.2s;
        }
        .menu-icon:hover { color: #fff; text-shadow: 0 0 8px #ffb7c5; }

        /* 页面标题 */
        h1 {
            text-align: center;
            color: #ffb7c5;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,183,197,0.4);
            letter-spacing: 3px;
        }

        /* 新增：引导介绍文字 */
        .intro-text {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 30px auto;
            font-size: 1.1em;
            line-height: 1.8;
            opacity: 0.8;
            color: #ccc;
            padding: 15px 20px;
            border-radius: 15px;
            transition: all 0.4s ease;
            cursor: default;
        }
        .intro-text:hover {
            opacity: 1;
            color: #fff;
            text-shadow: 0 0 12px rgba(255,183,197,0.6);
            background: rgba(255,255,255,0.04);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* 左右双色块容器 */
        .hero-split {
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            height: 70vh;
            min-height: 500px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        /* 单个色块 */
        .hero-panel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: flex 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s;
            text-decoration: none;
            color: white;
        }
        /* 左边橙色发光 */
        .panel-left {
            background: rgba(255, 140, 0, 0.15);
            box-shadow: inset 0 0 60px rgba(255, 140, 0, 0.4), 0 0 30px rgba(255, 140, 0, 0.3);
        }
        /* 右边粉色发光 */
        .panel-right {
            background: rgba(255, 105, 180, 0.15);
            box-shadow: inset 0 0 60px rgba(255, 105, 180, 0.4), 0 0 30px rgba(255, 105, 180, 0.3);
        }
        /* 悬停时色块放大 */
        .hero-panel:hover {
            flex: 1.5;
            z-index: 2;
        }
        .panel-left:hover {
            box-shadow: inset 0 0 80px rgba(255, 140, 0, 0.7), 0 0 50px rgba(255, 140, 0, 0.6);
        }
        .panel-right:hover {
            box-shadow: inset 0 0 80px rgba(255, 105, 180, 0.7), 0 0 50px rgba(255, 105, 180, 0.6);
        }

        /* 角色立绘 */
        .hero-panel img {
            position: absolute;
            height: 90%;
            width: auto;
            bottom: 0;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
            opacity: 0.7;
            filter: brightness(0.9);
        }
        .panel-left img {
            left: -30%;
            transform: translateX(0);
        }
        .panel-left:hover img {
            left: 5%;
            transform: translateX(0);
            opacity: 1;
            filter: brightness(1.1);
        }
        .panel-right img {
            right: -30%;
            transform: translateX(0);
        }
        .panel-right:hover img {
            right: 5%;
            transform: translateX(0);
            opacity: 1;
            filter: brightness(1.1);
        }

        /* 角色名字 */
        .panel-name {
            position: relative;
            z-index: 3;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,0,0,0.7);
            transition: transform 0.4s, opacity 0.4s;
            opacity: 0.7;
            transform: translateY(10px);
        }
        .hero-panel:hover .panel-name {
            opacity: 1;
            transform: translateY(0);
            text-shadow: 0 0 30px currentColor;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            opacity: 0.5;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="home-link">首页</a>
        <a href="directory.html" class="menu-icon">☰</a>
    </nav>

    <!-- 页面标题 -->
    <h1>🌌 亡星虚拟歌姬计划</h1>

    <!-- 新增：介绍文本（鼠标悬停有特效） -->
    <div class="intro-text">
        在废弃的星轨尽头，沉睡的歌姬们被重新唤醒。<br>
        她们用声音编织记忆，用旋律对抗遗忘。<br>
        选择一位歌姬，走进他/她的过去与未来。
    </div>

    <!-- 双角色展示区 -->
    <div class="hero-split">
        <!-- 左角色：橙色 -->
        <a href="chenne.html" class="hero-panel panel-left">
            <img src="images/chenne.png" alt="敶音 ハン">
            <span class="panel-name">敶音 ハン</span>
        </a>
        <!-- 右角色：粉色 -->
        <a href="chuune.html" class="hero-panel panel-right">
            <img src="images/chuune.png" alt="紬音シュン">
            <span class="panel-name">紬音シュン</span>
        </a>
    </div>
    <div class="intro-text">
        这是我第一个虚拟歌姬项目。<br>
        其他歌姬【酸素音冰】【遥音月】【余音漫】已在开发！<br>
        你见证了他们的产生、发展和消亡。
    </div>
    <div class="footer">© 2026 二项式顺铂</div>
</body>
</html>
