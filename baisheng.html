<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百声企划 - 幻音歌姬计划</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 背景小球容器 */
        .bg-balls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让点击穿透到下方内容 */
            z-index: 0;
        }
        /* 单个小球 */
        .ball {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(20, 20, 30, 0.55);
            border: 2px solid rgba(255, 140, 179, 0.6);
            box-shadow: 0 0 10px rgba(255,140,179,0.2);
            color: rgba(255,255,255,0.8);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            animation: floatBall 12s infinite alternate ease-in-out;
            pointer-events: auto; /* 使小球可悬停 */
            cursor: default;
            z-index: 1;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .ball:hover {
            transform: scale(1.2);
            box-shadow: 0 0 25px currentColor;
            border-color: #fff;
            color: #fff;
            z-index: 10;
        }
        /* 不同颜色的小球边框 */
        .ball.pink { border-color: rgba(255, 140, 179, 0.7); }
        .ball.orange { border-color: rgba(255, 165, 0, 0.7); }
        .ball.purple { border-color: rgba(180, 130, 255, 0.7); }
        .ball.green { border-color: rgba(100, 255, 180, 0.7); }
        .ball.blue { border-color: rgba(100, 180, 255, 0.7); }

        /* 不同飘动路径 */
        @keyframes floatBall {
            0% { transform: translate(0, 0); }
            25% { transform: translate(30px, -20px); }
            50% { transform: translate(-15px, 25px); }
            75% { transform: translate(-25px, -10px); }
            100% { transform: translate(20px, 15px); }
        }
        /* 每个球稍微错开时间 */
        .ball:nth-child(1) { animation-duration: 14s; animation-delay: 0s; }
        .ball:nth-child(2) { animation-duration: 16s; animation-delay: -3s; }
        .ball:nth-child(3) { animation-duration: 13s; animation-delay: -6s; }
        .ball:nth-child(4) { animation-duration: 15s; animation-delay: -9s; }
        .ball:nth-child(5) { animation-duration: 17s; animation-delay: -12s; }
        .ball:nth-child(6) { animation-duration: 11s; animation-delay: -15s; }
        .ball:nth-child(7) { animation-duration: 18s; animation-delay: -18s; }
        .ball:nth-child(8) { animation-duration: 12s; animation-delay: -21s; }
        .ball:nth-child(9) { animation-duration: 14s; animation-delay: -24s; }
        .ball:nth-child(10) { animation-duration: 16s; animation-delay: -27s; }
        /* 如果小球更多，继续添加... */

        /* 导航栏 */
        .navbar {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 30px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        .home-link {
            color: #ffb7c5;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
        }
        .menu-icon {
            font-size: 1.8em;
            color: #ffb7c5;
            text-decoration: none;
            line-height: 1;
            transition: 0.2s;
        }
        .menu-icon:hover { color: #fff; text-shadow: 0 0 8px #ffb7c5; }

        .container {
            position: relative;
            z-index: 20;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            color: #ffb7c5;
            text-shadow: 0 0 25px rgba(255,183,197,0.6);
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        /* 介绍文本 */
        .intro-text {
            text-align: center;
            max-width: 750px;
            margin: 0 auto 35px auto;
            font-size: 1.15em;
            line-height: 1.9;
            opacity: 0.85;
            color: #ddd;
            padding: 20px 25px;
            border-radius: 15px;
            transition: all 0.4s ease;
            cursor: default;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .intro-text:hover {
            opacity: 1;
            color: #fff;
            text-shadow: 0 0 12px rgba(255,183,197,0.5);
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,183,197,0.2);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .section-title {
            text-align: center;
            color: #ffb7c5;
            font-size: 1.8em;
            margin: 40px 0 20px;
            opacity: 0.9;
        }

        .name-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        .name-tag {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 10px 22px;
            font-size: 1.1em;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: default;
        }
        .name-tag:hover {
            background: rgba(255,183,197,0.15);
            border-color: #ffb7c5;
            box-shadow: 0 0 15px rgba(255,183,197,0.3);
            transform: translateY(-3px);
        }

        .footer {
            position: relative;
            z-index: 20;
            text-align: center;
            margin-top: 50px;
            opacity: 0.5;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2em; }
            .intro-text { font-size: 1em; padding: 15px; }
        }
    </style>
</head>
<body>
    <!-- 动态背景小球 -->
    <div class="bg-balls" id="bgBalls"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="home-link">首页</a>
        <a href="directory.html" class="menu-icon">☰</a>
    </nav>

    <div class="container">
        <h1>🎙️ 百声企划</h1>

        <div class="intro-text">
            这是一项跨越100个平行宇宙的声音封存计划。<br>
            每一个宇宙里，都有一位歌姬的声库被小心翼翼地采集、制作、归档。<br>
            她们尚未苏醒，但声音的种子已经埋下。<br>
            100种音色，100段故事，100个等待被唱响的世界。
        </div>

        <div class="section-title">✦ 制作中の歌姬 ✦</div>
        <div class="name-cloud">
            <span class="name-tag">酸素音 ビン</span>
            <span class="name-tag">余音 マン</span>
            <span class="name-tag">敶音 ジン</span>
            <span class="name-tag">遙音 イェン</span>
            <span class="name-tag">武音 シェン</span>
            <span class="name-tag">遠音 フォン</span>
        </div>

        <div class="footer">© 2026 二项式顺铂 · 百声企划</div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('bgBalls');
            // 片假名列表
            const kana = ['ア','イ','ウ','エ','オ','カ','キ','ク','ケ','コ','サ','シ','ス','セ','ソ',
                          'タ','チ','ツ','テ','ト','ナ','ニ','ヌ','ネ','ノ','ハ','ヒ','フ','ヘ','ホ',
                          'マ','ミ','ム','メ','モ','ヤ','ユ','ヨ','ラ','リ','ル','レ','ロ','ワ','ヲ','ン'];
            // 颜色类名
            const colorClasses = ['pink', 'orange', 'purple', 'green', 'blue'];
            const ballCount = 20; // 小球数量

            for (let i = 0; i < ballCount; i++) {
                const ball = document.createElement('div');
                ball.classList.add('ball');
                // 随机片假名
                ball.textContent = kana[Math.floor(Math.random() * kana.length)];
                // 随机颜色类
                ball.classList.add(colorClasses[Math.floor(Math.random() * colorClasses.length)]);
                // 随机大小
                const size = 50 + Math.floor(Math.random() * 60); // 50-110px
                ball.style.width = size + 'px';
                ball.style.height = size + 'px';
                ball.style.fontSize = (size * 0.4) + 'px';
                // 随机位置
                ball.style.left = Math.random() * 90 + '%';
                ball.style.top = Math.random() * 90 + '%';
                // 随机动画延迟，让运动更错落
                ball.style.animationDelay = -(Math.random() * 10) + 's';
                ball.style.animationDuration = 10 + Math.random() * 10 + 's';
                container.appendChild(ball);
            }
        })();
    </script>
</body>
</html>
